name: Release client exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build client
        run: |
          if (Test-Path "asobby.spec") {
            pyinstaller asobby.spec
          } else {
            pyinstaller --noconfirm --clean --onedir --name asobby src\main.py
          }

      - name: Archive build output
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "asobby-$version-windows.zip"
          Compress-Archive -Path "dist/asobby/*" -DestinationPath $zipName -Force
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = $env:ZIP_NAME

          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $zip `
              --title "asobby client $tag" `
              --generate-notes
          } else {
            gh release upload $tag $zip --clobber
          }
